{% extends "admin/base_site.html" %}

{% block breadcrumbs %}
<div class="breadcrumbs">
<a href="{% url 'admin:index' %}">Home</a>
&rsaquo; Change admin password
</div>
{% endblock %}

{% block content %}
<div id="content-main">
  <ul class="object-tools">
    <li>
      <a href="{{ register_url }}">Register admin user</a>
    </li>
  </ul>

  <form method="post" novalidate>
    {% csrf_token %}
    {{ form.as_p }}
    <div class="submit-row">
      <input type="submit" value="Update password" class="default">
    </div>
  </form>
</div>
{% endblock %}
